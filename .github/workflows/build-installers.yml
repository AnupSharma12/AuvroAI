name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows-msi:
    name: Windows MSI
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Install WiX Toolset
        run: winget install --id WiXToolset.WiXToolset -e --accept-package-agreements --accept-source-agreements --force

      - name: Build MSI
        run: cargo wix -b "C:\\Program Files (x86)\\WiX Toolset v3.14\\bin" --nocapture

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: target/wix/*.msi

  linux-deb:
    name: Linux DEB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libxkbcommon-dev libwayland-dev libasound2-dev libudev-dev libgtk-3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build DEB
        run: cargo deb --release

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: target/debian/*.deb

  macos-dmg:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install bundlers
        run: |
          cargo install cargo-bundle --locked
          brew install create-dmg

      - name: Build .app bundle
        run: cargo bundle --release

      - name: Build DMG
        run: |
          mkdir -p dist
          create-dmg \
            --volname "AuvroAI" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "AuvroAI.app" 200 190 \
            --hide-extension "AuvroAI.app" \
            --app-drop-link 600 185 \
            "dist/AuvroAI.dmg" \
            "target/release/bundle/osx/AuvroAI.app"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
