name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  windows-msi:
    name: Windows MSI
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          AUVRO_API_KEY: ${{ secrets.AUVRO_API_KEY }}
          AUVRO_ENDPOINT: ${{ secrets.AUVRO_ENDPOINT }}
          AUVRO_MODEL: ${{ secrets.AUVRO_MODEL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
        shell: pwsh
        run: |
          $required = @(
            "SUPABASE_URL",
            "SUPABASE_PUBLISHABLE_KEY",
            "AUVRO_API_KEY",
            "AUVRO_ENDPOINT",
            "AUVRO_MODEL",
            "OPENROUTER_API_KEY",
            "OPENROUTER_BASE_URL",
            "OPENROUTER_MODEL"
          )

          foreach ($k in $required) {
            $v = (Get-Item "env:$k").Value
            if ([string]::IsNullOrWhiteSpace($v)) {
              throw "Missing GitHub secret: $k"
            }
          }

          $lines = @(
            "SUPABASE_URL=$env:SUPABASE_URL",
            "SUPABASE_PUBLISHABLE_KEY=$env:SUPABASE_PUBLISHABLE_KEY",
            "AUVRO_API_KEY=$env:AUVRO_API_KEY",
            "AUVRO_ENDPOINT=$env:AUVRO_ENDPOINT",
            "AUVRO_MODEL=$env:AUVRO_MODEL",
            "OPENROUTER_API_KEY=$env:OPENROUTER_API_KEY",
            "OPENROUTER_BASE_URL=$env:OPENROUTER_BASE_URL",
            "OPENROUTER_MODEL=$env:OPENROUTER_MODEL"
          )
          Set-Content -Path .env -Value $lines

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Install WiX Toolset
        run: winget install --id WiXToolset.WiXToolset -e --accept-package-agreements --accept-source-agreements --force

      - name: Build MSI
        run: cargo wix -b "C:\\Program Files (x86)\\WiX Toolset v3.14\\bin" --nocapture

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: target/wix/*.msi

  linux-deb:
    name: Linux DEB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          AUVRO_API_KEY: ${{ secrets.AUVRO_API_KEY }}
          AUVRO_ENDPOINT: ${{ secrets.AUVRO_ENDPOINT }}
          AUVRO_MODEL: ${{ secrets.AUVRO_MODEL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
        run: |
          required=(
            SUPABASE_URL
            SUPABASE_PUBLISHABLE_KEY
            AUVRO_API_KEY
            AUVRO_ENDPOINT
            AUVRO_MODEL
            OPENROUTER_API_KEY
            OPENROUTER_BASE_URL
            OPENROUTER_MODEL
          )

          for key in "${required[@]}"; do
            value="${!key}"
            if [ -z "${value}" ]; then
              echo "Missing GitHub secret: ${key}" >&2
              exit 1
            fi
          done

          {
            echo "SUPABASE_URL=${SUPABASE_URL}"
            echo "SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}"
            echo "AUVRO_API_KEY=${AUVRO_API_KEY}"
            echo "AUVRO_ENDPOINT=${AUVRO_ENDPOINT}"
            echo "AUVRO_MODEL=${AUVRO_MODEL}"
            echo "OPENROUTER_API_KEY=${OPENROUTER_API_KEY}"
            echo "OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}"
            echo "OPENROUTER_MODEL=${OPENROUTER_MODEL}"
          } > .env

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libxkbcommon-dev libwayland-dev libasound2-dev libudev-dev libgtk-3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build DEB
        run: cargo deb

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: target/debian/*.deb

  macos-dmg:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          AUVRO_API_KEY: ${{ secrets.AUVRO_API_KEY }}
          AUVRO_ENDPOINT: ${{ secrets.AUVRO_ENDPOINT }}
          AUVRO_MODEL: ${{ secrets.AUVRO_MODEL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
        run: |
          required=(
            SUPABASE_URL
            SUPABASE_PUBLISHABLE_KEY
            AUVRO_API_KEY
            AUVRO_ENDPOINT
            AUVRO_MODEL
            OPENROUTER_API_KEY
            OPENROUTER_BASE_URL
            OPENROUTER_MODEL
          )

          for key in "${required[@]}"; do
            value="${!key}"
            if [ -z "${value}" ]; then
              echo "Missing GitHub secret: ${key}" >&2
              exit 1
            fi
          done

          {
            echo "SUPABASE_URL=${SUPABASE_URL}"
            echo "SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}"
            echo "AUVRO_API_KEY=${AUVRO_API_KEY}"
            echo "AUVRO_ENDPOINT=${AUVRO_ENDPOINT}"
            echo "AUVRO_MODEL=${AUVRO_MODEL}"
            echo "OPENROUTER_API_KEY=${OPENROUTER_API_KEY}"
            echo "OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}"
            echo "OPENROUTER_MODEL=${OPENROUTER_MODEL}"
          } > .env

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install bundlers
        run: |
          cargo install cargo-bundle --locked
          brew install create-dmg

      - name: Build .app bundle
        run: cargo bundle --release

      - name: Build DMG
        run: |
          mkdir -p dist
          create-dmg \
            --volname "AuvroAI" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "AuvroAI.app" 200 190 \
            --hide-extension "AuvroAI.app" \
            --app-drop-link 600 185 \
            "dist/AuvroAI.dmg" \
            "target/release/bundle/osx/AuvroAI.app"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
